<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>ZChat 运维登录</title>
    <style>
        :root {
            --bg: #0f1419;
            --card: #1a2332;
            --border: #2d3a4d;
            --text: #e6edf3;
            --muted: #8b9cb3;
            --accent: #58a6ff;
            --bad: #f85149;
            --ok: #3fb950;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--text);
            font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, Arial, sans-serif;
        }
        .card {
            width: min(92vw, 420px);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.2rem 1.2rem 1rem;
        }
        h1 {
            margin: 0 0 0.4rem;
            font-size: 1.1rem;
        }
        .sub {
            margin: 0 0 1rem;
            color: var(--muted);
            font-size: 0.88rem;
        }
        label {
            display: block;
            margin-top: 0.7rem;
            margin-bottom: 0.25rem;
            font-size: 0.85rem;
        }
        input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #0c1117;
            color: var(--text);
            padding: 0.55rem 0.7rem;
            font-size: 0.92rem;
        }
        button {
            margin-top: 1rem;
            width: 100%;
            border: 1px solid #3c6fb2;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            border-radius: 8px;
            padding: 0.55rem 0.7rem;
            cursor: pointer;
        }
        .msg {
            margin-top: 0.9rem;
            font-size: 0.85rem;
            display: none;
        }
        .msg.bad { color: var(--bad); }
        .msg.ok { color: var(--ok); }
    </style>
</head>
<body>
<form class="card" method="post" action="/ops/login">
    <h1>ZChat 运维面板</h1>
    <p class="sub">请使用运维账号登录。与 Actuator 共用 spring.security.user 凭据。</p>
    <label for="username">用户名</label>
    <input id="username" name="username" type="text" autocomplete="username" required/>
    <label for="password">密码</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required/>
    <button type="submit">登录</button>
    <div id="err" class="msg bad">登录失败：用户名或密码错误。</div>
    <div id="ok" class="msg ok">已退出登录。</div>
</form>
<script>
    (function () {
        const q = new URLSearchParams(window.location.search);
        if (q.get('error') === 'true') document.getElementById('err').style.display = 'block';
        if (q.get('logout') === 'true') document.getElementById('ok').style.display = 'block';
    })();
</script>
</body>
</html>
